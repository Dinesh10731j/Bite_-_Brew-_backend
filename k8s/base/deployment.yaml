apiVersion: apps/v1
kind: Deployment
metadata:
  name: bite-brew-cafe-backend
  labels:
    app: bite-brew-cafe-backend
spec:
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: bite-brew-cafe-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bite-brew-cafe-backend
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/path: /metrics
        prometheus.io/port: '7000'
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: app
          image: APP_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7000
              name: http
          envFrom:
            - configMapRef:
                name: bite-brew-config
            - secretRef:
                name: bite-brew-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 5
            failureThreshold: 24
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
